version: "3.9"

# ============================================================
# Platform Cloud-Optimized Docker Compose
# Designed for Coolify "Zero-Config" Deployment
# ============================================================


services:
  # ------------------------------------------------------------
  # API Engine — ElysiaJS on Bun (Compiled Binary)
  # ------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: platform-api
    restart: always
    expose:
      - "3001"
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - API_PORT=${API_PORT:-3001}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-https://buffinteractive.net}
      - LEMON_SQUEEZY_API_KEY=${LEMON_SQUEEZY_API_KEY}
      - LEMON_SQUEEZY_STORE_ID=${LEMON_SQUEEZY_STORE_ID}
      - LEMON_SQUEEZY_WEBHOOK_SECRET=${LEMON_SQUEEZY_WEBHOOK_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --spider -T 5 http://localhost:3001/v1/health || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 45s

  # ------------------------------------------------------------
  # Web — Next.js 15 Standalone
  # ------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: platform-web
    restart: always
    expose:
      - "3000"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://api:3001
      - NEXT_PUBLIC_API_URL=https://api.buffinteractive.net
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - BETTER_AUTH_URL=https://buffinteractive.net
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const r = require('http').get('http://localhost:3000', res => process.exit(res.statusCode < 500 ? 0 : 1)); r.on('error', () => process.exit(1)); r.setTimeout(5000, () => { r.destroy(); process.exit(1); });"
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s
