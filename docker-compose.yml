version: "3.9"

# ============================================================
# Platform Cloud-Optimized Docker Compose
# ============================================================

networks:
  platform:
    driver: bridge

services:
  # ------------------------------------------------------------
  # API Engine — ElysiaJS on Bun (Compiled Binary)
  # ------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: platform-api
    restart: always
    networks:
      - platform
    # Exposing ports internally for the Coolify proxy
    expose:
      - "3001"
    # Port mapping kept for direct access if needed (optional)
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - API_PORT=3001
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:3001/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ------------------------------------------------------------
  # Web — Next.js 15 Standalone
  # ------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: platform-web
    restart: always
    networks:
      - platform
    expose:
      - "3000"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # SSR fallback to internal network; override in Coolify for Client-side
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://api:3001}
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
